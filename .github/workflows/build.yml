  freebsd-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Build on FreeBSD
      uses: vmactions/freebsd-vm@v1
      with:
        usesh: true
        prepare: |
          pkg install -y curl bash git
          curl -fsSL https://xmake.io/shget.text | sh
        run: |
          export PATH=$PATH:$HOME/.local/bin
          xmake -y
