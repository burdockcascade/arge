name: Build
concurrency:
  group: build
  cancel-in-progress: false
on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          actions-cache-key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua') }}
      - name: Build
        run: xmake -y
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Installation
        run: sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev
      - uses: actions/checkout@v6
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          actions-cache-key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua') }}
      - name: Build
        run: xmake -y
  mac-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          package-cache: true
          actions-cache-key: ${{ runner.os }}-xmake-${{ hashFiles('xmake.lua') }}
      - name: Build
        run: xmake -y
  freebsd-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          # Install xmake dependencies and xmake itself inside the VM
          prepare: |
            pkg install -y curl
            curl -fsSL https://xmake.io/shget.text | bash
          run: |
            export PATH=$PATH:$HOME/.local/bin
            xmake -y

    haiku-build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
        - name: Build on Haiku
          uses: vmactions/haiku-vm@v1
          with:
            usesh: true
            # Haiku uses 'pkgman' for package management
            prepare: |
              pkgman install -y gapk curl
              curl -fsSL https://xmake.io/shget.text | bash
            run: |
              export PATH=$PATH:$HOME/.local/bin
              xmake -y