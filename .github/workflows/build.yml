name: Build
concurrency:
  group: build
  cancel-in-progress: true
on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
jobs:
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Installation
        run: sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev
      - uses: actions/checkout@v6
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: linux-${{ hashFiles('xmake.lua') }}
      - name: Configure xmake
        run: xmake config --toolchain=clang -m release
      - name: Build
        run: xmake -y
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: windows-${{ hashFiles('xmake.lua') }}
      - name: Configure xmake
        run: xmake config --toolchain=clang-cl -m release
      - name: Build
        run: xmake -y